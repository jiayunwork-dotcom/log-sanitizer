# log-sanitizer Pipeline 配置文件示例
name: "log-processing-pipeline"

# 输入源配置
inputs:
  paths:
    - "./logs/*.log"
    - "./data/access_log"
  recursive: true
  encoding: "utf-8"

# 解析器配置
parser:
  # 日志格式: auto, json, apache, nginx, syslog, plaintext, custom
  format: "auto"
  # 自定义格式时使用，正则表达式中使用命名捕获组
  # custom_pattern: '^(?P<timestamp>\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}) \\[(?P<level>[A-Z]+)\\] (?P<message>.*)$'
  # custom_field_names:
  #   timestamp: "timestamp"
  #   level: "level"
  #   message: "message"

# 过滤条件(可选)
filters:
  # 只处理指定级别
  # levels: ["INFO", "WARN", "ERROR"]
  # 时间范围过滤
  # start_time: "2024-01-01T00:00:00+00:00"
  # end_time: "2024-12-31T23:59:59+00:00"
  # 包含关键词
  # include_keywords: ["error", "warning"]
  # 排除关键词
  # exclude_keywords: ["healthcheck", "debug"]

# 脱敏规则配置
sanitizers:
  # 内置规则开关
  builtin_rules:
    - name: "ipv4"
      enabled: true
      strategy: "generalize"  # mask, hash, replace, delete, generalize
    - name: "ipv6"
      enabled: true
      strategy: "generalize"
    - name: "email"
      enabled: true
      strategy: "generalize"
    - name: "phone"
      enabled: true
      strategy: "mask"
      params:
        keep_start: 3
        keep_end: 4
    - name: "id_card"
      enabled: true
      strategy: "mask"
      params:
        keep_start: 4
        keep_end: 4
    - name: "bank_card"
      enabled: true
      strategy: "mask"
      params:
        keep_start: 6
        keep_end: 4
    - name: "token"
      enabled: true
      strategy: "replace"
      params:
        replacement: "[REDACTED_TOKEN]"
    - name: "session"
      enabled: true
      strategy: "replace"
      params:
        replacement: "[REDACTED_SESSION]"
    - name: "cookie"
      enabled: true
      strategy: "replace"
      params:
        replacement: "[REDACTED_COOKIE]"

  # 自定义检测规则
  custom_rules:
    - name: "custom_ssn"
      enabled: true
      pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
      type: "custom"
      strategy: "mask"
      params:
        keep_start: 0
        keep_end: 4
        mask_char: "*"

  # 脱敏映射持久化配置
  # mapping_db_path: "./sanitizer_mappings.db"
  # hmac_key: "your-secret-key-here"  # 用于HMAC签名，保护原始值
  mapping_in_memory: true  # 仅内存中保持一致性，不持久化

# 输出配置
output:
  # 输出目标: file 或 stdout
  target: "file"
  file: "./output/sanitized_logs.jsonl"
  stdout: false
  # 按时间分割: day 或 hour
  # split_by_time: "day"
  # 文件名模板, 支持 {date} 和 {hour} 占位符
  # filename_template: "output_{date}_{hour}.jsonl"
  split_by_day: false  # 按天分割输出文件(已废弃, 使用 split_by_time)
  overwrite: false
  encoding: "utf-8"
  pretty: false  # 格式化JSON输出

# 处理配置
parallelism: 4  # 并行处理的文件数，默认CPU核心数
dry_run: false  # 只预览不实际写入
incremental: false  # 增量处理模式
# 增量处理状态文件路径(JSON格式)
# state_file: "./output/.processing_state.json"

# 脱敏前后对照审计日志
audit_log:
  enabled: false
  file: "./output/audit_log.jsonl"

# 审计报告配置
report_file: "./output/audit_report.txt"
report_json: "./output/audit_report.json"

# 异常检测配置
anomaly_detection:
  enabled: false
  alert_file: "./output/alerts.jsonl"
  min_samples: 100
  state_file: "./output/.anomaly_state.json"
  suppression_window_seconds: 600
  correlation_window_seconds: 30

  algorithms:
    frequency:
      window_size_seconds: 300
      alpha: 0.3
      threshold_multiplier: 3.0

    error_rate:
      window_size_seconds: 300
      k_windows: 20
      z_score_threshold: 2.5

    pattern:
      window_size_seconds: 300
      min_samples: 100
      disappear_windows: 3

  webhook:
    url: null
    headers: {}
    timeout_seconds: 5
    max_retries: 2
    retry_interval_seconds: 1
    dead_letter_file: "./output/webhook_dead_letter.jsonl"

stream:
  enabled: true
  high_watermark: 10000
  low_watermark: 5000
  drain_timeout: 30
  checkpoint_interval: 60
  heartbeat_interval: 30
  # metrics文件路径(JSON格式)，每个checkpoint周期结束时写入
  metrics_file: "./output/stream_metrics.json"
  # 条件路由规则：按日志级别将输出路由到不同目标
  # 匹配时按规则列表顺序，第一条命中即路由到对应目标
  # 未命中任何规则的走默认输出
  route_rules:
    - level_match: "ERROR,CRITICAL"
      output_target: "./output/error_logs.jsonl"
    - level_match: "WARN,WARNING"
      output_target: "./output/warn_logs.jsonl"
    - level_match: "INFO"
      output_target: "stdout"
  tail:
    poll_interval: 0.5
    max_line_length: 65536
